<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peça o nome de um produto, o preço e a quantidade comprada. Calcule e mostre o valor 
total da compra. </title>
</head>
<body>
    <script>
    let produto = prompt("Digite o nome do produto")
    let preco= parseFloat(prompt("Digite o valor do produto").replace(',', '.'))
    let qt = Number(prompt("Digite a quantidade do produto"))
    let total = qt * preco
    let totalfor= total.toString().replace('.', ',')
    let produtoMaiusculo = produto.toUpperCase()
    alert ( 'O valor total de ' +qt + ' de '+produtoMaiusculo+'(s)  são o total de $'+totalfor)
   window.location.href = "index.html"
   </script> 
   
   
</body>
</html>
