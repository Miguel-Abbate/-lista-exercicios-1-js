<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peça duas notas e calcule a média final.</title>
</head>
<body>
    <script>
     let numero1 = Number(prompt("Digite a 1° nota"))
     let numero2 = Number(prompt("Digite a 2° nota"))
     let media= (numero1 + numero2) / 2
     alert('Média= ' +media)
    </script>
</body>
</html>
