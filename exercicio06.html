<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peça duas notas e calcule a média final.</title>
</head>
<body>
    <script>
     alert('Média entre duas notas')   
     let numero1 = parseFloat(prompt("Digite a 1° nota ").replace(',', '.'))
     let numero2 = parseFloat(prompt("Digite a 2° nota ").replace(',', '.'))
     let media= (numero1 + numero2) / 2
     let mediafor= media.toString().replace('.', ',')
     alert('Média= ' +mediafor)
        window.location.href = "index.html"

    </script>
</body>
</html>
