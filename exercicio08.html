<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peça a largura e a altura de um retângulo e calcule a área. Formula: largura * altura </title>
</head>
<body>
    <script>
     let numero1 = Number(prompt("Digite a altura "))
     let numero2 = Number(prompt("Digite a largura"))
     let area = (numero1 * numero2)
     alert ( 'A area do retangulo é ' +area)
     </script>
     
</body>
</html>
