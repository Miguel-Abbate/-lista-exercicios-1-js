<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peça a largura e a altura de um retângulo e calcule a área. Formula: largura * altura </title>
</head>
<body>
    <script>
     let numero1 = parseFloat(prompt("Digite a altura ").replace(',', '.'))
     let numero2 = parseFloat(prompt("Digite a largura").replace(',', '.'))
     let area = (numero1 * numero2)
     let areafor= area.toString().replace('.', ',')
     alert ( 'A area do retangulo é ' +areafor)
        window.location.href = "index.html"

    
     </script>
     
</body>
</html>
