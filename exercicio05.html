<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peça dois números e mostre: soma, subtração, multiplicação e divisão.</title>
</head>
<body>
  <script>
     
     alert('Quatro operações com dois números')
     let numero1 = parseFloat(prompt("Digite o 1° número").replace(',', '.'))
     let numero2 = parseFloat(prompt("Digite o 2° número").replace(',', '.'))
     let soma= numero1 + numero2
      let somafor= soma.toString().replace('.', ',')
     alert('Total Soma = ' +somafor)
     let subtracao= numero1 - numero2
      let subfor= subtracao.toString().replace('.', ',')
     alert('Total Subtração= ' +subfor)
     let multiplicacao= numero1 * numero2
      let multifor= multiplicacao.toString().replace('.', ',')
     alert('Total Multiplicação= ' +multifor)
     let divisao= numero1 / numero2
      let divifor= divisao.toString().replace('.', ',')
     alert('Total Divisão= ' +divifor)
        window.location.href = "index.html"

  </script>  
</body>
</html>
