<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peça dois números e mostre: soma, subtração, multiplicação e divisão.</title>
</head>
<body>
  <script>
     
     let soma= numero1 + numero2let numero1 = Number(prompt("Digite o 1° numero"))
     let numero2 = Number(prompt("Digite o 2° numero"))
     alert('Total Soma = ' +soma)
     let subtracao= numero1 - numero2
     alert('Total Subtração= ' +subtracao)
     let multiplicacao= numero1 * numero2
     alert('Total Multiplicação= ' +multiplicacao)
     let divisao= numero1 / numero2
     alert('Total Divisão= ' +divisao)
  </script>  
</body>
</html>
