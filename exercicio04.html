<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Peça dois números, calcule a soma e mostre o resultado </title>
</head>
<body>
    <script>
     alert('Soma entre dois números')   
     let numero1 = parseFloat(prompt("Digite o 1° numero").replace(',', '.'))
     let numero2 = parseFloat(prompt("Digite o 2° numero").replace(',', '.'))
     let soma= numero1 + numero2
     let somafor= soma.toString().replace('.', ',')
     alert('Total = ' +somafor)
        window.location.href = "index.html"


    </script>
</body>
</html>
